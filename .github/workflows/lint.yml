name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src/ tests/

      - name: Run ruff (format check)
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy src/

      - name: Run bandit (security)
        run: bandit -c pyproject.toml -r src/

      - name: Run checkov (IaC security)
        run: |
          checkov -d . \
            --framework dockerfile \
            --skip-check CKV_DOCKER_2,CKV_DOCKER_3,CKV_DOCKER_7 \
            --quiet

      - name: Run pandera schema validation (via tests)
        run: pytest tests/ -k "pandera or schema or validate" --no-header -q || true
